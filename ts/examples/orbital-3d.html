<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>3D軌道ビューア — SOLAR LINE 考証</title>
<style>
:root {
  --bg: #0d1117;
  --card-bg: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; }
header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
header h1 { font-size: 1.1em; color: var(--accent); white-space: nowrap; }
#preset-buttons { display: flex; gap: 8px; }
.preset-btn {
  background: #21262d; color: var(--text); border: 1px solid var(--border);
  padding: 6px 14px; cursor: pointer; border-radius: 4px; font-size: 0.85em;
  transition: background 0.15s;
}
.preset-btn:hover { background: var(--border); }
.preset-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: bold; }
#main { display: flex; flex: 1; overflow: hidden; }
#viewer-container { flex: 1; position: relative; }
#info-panel {
  width: 300px; background: var(--card-bg); border-left: 1px solid var(--border);
  padding: 16px; overflow-y: auto; font-size: 0.9em;
}
#info-panel h3 { color: var(--accent); margin-bottom: 8px; font-size: 1em; }
#info-panel p { margin: 6px 0; line-height: 1.5; }
#info-panel strong { color: var(--green); }
#info-panel table { width: 100%; border-collapse: collapse; margin: 8px 0; }
#info-panel th, #info-panel td { padding: 4px 8px; border: 1px solid var(--border); text-align: right; font-size: 0.85em; }
#info-panel th { background: #21262d; text-align: left; }
#controls-hint {
  position: absolute; bottom: 12px; left: 12px;
  background: rgba(13,17,23,0.8); padding: 8px 12px; border-radius: 4px;
  font-size: 0.8em; color: var(--text-muted);
}
#timeline-controls {
  display: none; /* shown only for full-route scene */
  padding: 8px 20px;
  border-top: 1px solid var(--border);
  background: var(--card-bg);
  align-items: center; gap: 12px;
}
#timeline-controls.active { display: flex; }
#timeline-controls button {
  background: #21262d; color: var(--text); border: 1px solid var(--border);
  width: 36px; height: 36px; cursor: pointer; border-radius: 4px;
  font-size: 1.1em; display: flex; align-items: center; justify-content: center;
}
#timeline-controls button:hover { background: var(--border); }
#timeline-slider {
  flex: 1; accent-color: var(--accent); cursor: pointer;
}
#timeline-time {
  font-size: 0.85em; color: var(--accent); min-width: 80px; text-align: right;
  font-variant-numeric: tabular-nums;
}
#timeline-label {
  font-size: 0.8em; color: var(--text-muted); min-width: 200px;
}
#speed-btn, #view-mode-btn {
  background: #21262d; color: var(--accent); border: 1px solid var(--border);
  padding: 4px 12px; cursor: pointer; border-radius: 4px;
  font-size: 0.85em; white-space: nowrap;
}
#speed-btn:hover, #view-mode-btn:hover { background: var(--border); }
#loading {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.2em; color: var(--accent);
}
#back-link {
  color: var(--accent); text-decoration: none; font-size: 0.85em;
}
#back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="app">
  <header>
    <a id="back-link" href="../">← 考証トップ</a>
    <h1>3D軌道ビューア</h1>
    <div id="preset-buttons">
      <button class="preset-btn active" data-scene="full-route" aria-pressed="true">全航路</button>
      <button class="preset-btn" data-scene="episode-1" aria-pressed="false">EP01</button>
      <button class="preset-btn" data-scene="episode-2" aria-pressed="false">EP02</button>
      <button class="preset-btn" data-scene="episode-3" aria-pressed="false">EP03</button>
      <button class="preset-btn" data-scene="episode-4" aria-pressed="false">EP04</button>
      <button class="preset-btn" data-scene="episode-5" aria-pressed="false">EP05</button>
      <button class="preset-btn" data-scene="jupiter-capture" aria-pressed="false">木星捕獲</button>
      <button class="preset-btn" data-scene="saturn-ring" aria-pressed="false">土星リング</button>
      <button class="preset-btn" data-scene="uranus-approach" aria-pressed="false">天王星接近</button>
      <button class="preset-btn" data-scene="earth-arrival" aria-pressed="false">地球到着</button>
    </div>
  </header>
  <div id="main">
    <div id="viewer-container">
      <div id="loading">読み込み中...</div>
      <div id="controls-hint">ドラッグ: 回転 ｜ スクロール: ズーム ｜ 右ドラッグ: 移動</div>
    </div>
    <div id="info-panel">
      <h3>3D軌道ビューア</h3>
      <p>左のプリセットボタンで表示シーンを切り替えます。</p>
    </div>
  </div>
  <div id="timeline-controls">
    <button id="timeline-play" aria-label="再生">&#x25b6;</button>
    <input type="range" id="timeline-slider" min="0" max="1000" value="0"
           aria-label="ミッションタイムライン" aria-valuenow="0" aria-valuemin="0" aria-valuemax="1000">
    <span id="timeline-time">0日</span>
    <span id="timeline-total" style="font-size:0.75em;color:var(--text-muted);white-space:nowrap;"></span>
    <span id="timeline-label"></span>
    <button id="speed-btn" aria-label="再生速度" title="アニメーション速度の切替">1×</button>
    <button id="view-mode-btn" aria-label="視点切替" title="慣性座標/宇宙船視点の切替">慣性</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import { initViewer, loadScene, updateInfoPanel, loadTimeline, updateTimelineFrame, setTimelinePlaying, getTimelineCurrentDay, setViewMode, getViewMode, setScenarioVisible } from "../src/orbital-3d-viewer.js";

// ── Load analysis data ──
const analysisDataUrl = "../reports/data/calculations/3d_orbital_analysis.json";
let analysisData;

// ── Data preparation (matches orbital-3d-viewer-data.ts) ──
const AU_TO_SCENE = 5;

const PLANET_COLORS = {
  mars: "#e05050", jupiter: "#e0a040", saturn: "#d4b896",
  uranus: "#7ec8e3", earth: "#4488ff",
  io: "#d29922", europa: "#c8d8e8", ganymede: "#58a6ff", callisto: "#8b6914",
  enceladus: "#ccddee", titania: "#aabbcc",
  rhea: "#aaaacc", titan: "#ddaa55", miranda: "#99bbaa", oberon: "#bb9988",
  luna: "#c0c0c0",
};
const EPISODE_COLORS = { 1: "#ff6644", 2: "#ffaa22", 3: "#44cc88", 4: "#4488ff", 5: "#ff4444" };
const PLANET_RADII = { mars: 0.15, jupiter: 0.4, saturn: 0.35, uranus: 0.25, earth: 0.15, io: 0.06, europa: 0.06, ganymede: 0.08, callisto: 0.07, enceladus: 0.08, titania: 0.08, rhea: 0.07, titan: 0.09, miranda: 0.06, oberon: 0.07, luna: 0.08 };
const MOON_ORBIT_KM = { io: 421800, europa: 671100, ganymede: 1070400, callisto: 1882700, enceladus: 238020, rhea: 527108, titan: 1221870, miranda: 129390, titania: 435910, oberon: 583520, luna: 384400 };
const MOON_PERIODS_DAYS = { io: 1.769138, europa: 3.551181, ganymede: 7.154553, callisto: 16.6890184, enceladus: 1.370218, rhea: 4.518212, titan: 15.945, miranda: 1.413479, titania: 8.705872, oberon: 13.463, luna: 27.321661 };
const JUPITER_RADIUS_KM = 71492;
function mkMoon(name, label, angle) {
  const r = MOON_ORBIT_KM[name] / 50000;
  return { name, x: r * Math.cos(angle), y: r * Math.sin(angle), z: 0, color: PLANET_COLORS[name] || "#ffffff", radius: PLANET_RADII[name] || 0.08, orbitRadius: MOON_ORBIT_KM[name], label };
}
const ORBIT_RADII_AU = { mars: 1.524, jupiter: 5.203, saturn: 9.537, uranus: 19.19, earth: 1.0 };
const ORBITAL_PERIODS_DAYS = { mars: 686.97, jupiter: 4332.59, saturn: 10759.22, uranus: 30688.5, earth: 365.256 };

function zFromAU(zAU) { return zAU * AU_TO_SCENE * 3; }

const FALLBACK_ANGLES = [Math.PI*0.1, Math.PI*0.35, Math.PI*0.55, Math.PI*0.75, Math.PI*1.85];

function planetAngle(planet, index, data) {
  // Prefer mission-start longitudes for correct animation timing
  const ms = data?.planetLongitudesAtMissionStart?.[planet];
  if (typeof ms === "number") return ms;
  const p = data?.planetaryZHeightsAtEpoch?.[planet];
  return (p && typeof p.eclipticLongitudeRad === "number") ? p.eclipticLongitudeRad : (FALLBACK_ANGLES[index] ?? index * Math.PI * 0.4);
}

function planetXY(planet, index, data) {
  const r = (ORBIT_RADII_AU[planet] ?? 5) * AU_TO_SCENE;
  const a = planetAngle(planet, index, data);
  return { x: r * Math.cos(a), y: r * Math.sin(a), angle: a };
}

function prepareFullRouteScene(data) {
  const planetOrder = ["mars", "jupiter", "saturn", "uranus", "earth"];
  const planets = planetOrder.map((name, i) => {
    const p = data.planetaryZHeightsAtEpoch[name];
    const pos = planetXY(name, i, data);
    return { name, x: pos.x, y: pos.y, z: zFromAU(p?.zHeightAU ?? 0),
      color: PLANET_COLORS[name], radius: PLANET_RADII[name] ?? 0.15,
      label: { mars:"火星", jupiter:"木星", saturn:"土星", uranus:"天王星", earth:"地球" }[name] };
  });
  // Build timeline data (before transfer arcs, needed for position computation)
  const firstJd = data.transfers[0]?.departure.jd ?? 0;
  const lastJd = data.transfers[data.transfers.length - 1]?.arrival.jd ?? firstJd;
  const totalDays = lastJd - firstJd;

  const orbits = planetOrder.map((name, i) => {
    const p = data.planetaryZHeightsAtEpoch[name];
    const period = ORBITAL_PERIODS_DAYS[name] || 1;
    const a = planetAngle(name, i, data);
    return {
      name,
      radiusScene: (ORBIT_RADII_AU[name] ?? 5) * AU_TO_SCENE,
      initialAngle: a,
      meanMotionPerDay: (2 * Math.PI) / period,
      z: zFromAU(p?.zHeightAU ?? 0),
    };
  });

  // Planet position at a given day offset
  const orbMap = {};
  orbits.forEach(o => { orbMap[o.name] = o; });
  function posAtDay(orb, day) {
    const a = orb.initialAngle + orb.meanMotionPerDay * day;
    return [orb.radiusScene * Math.cos(a), orb.radiusScene * Math.sin(a), orb.z];
  }

  // Transfer arcs: use planet positions at actual departure/arrival times
  const transferArcs = data.transfers.map(t => {
    const depDay = t.departure.jd - firstJd;
    const arrDay = t.arrival.jd - firstJd;
    const fo = orbMap[t.departure.planet];
    const to2 = orbMap[t.arrival.planet];
    const fromPos = fo ? posAtDay(fo, depDay) : (() => { const p = planets.find(p => p.name === t.departure.planet); return [p.x, p.y, p.z]; })();
    const toPos = to2 ? posAtDay(to2, arrDay) : (() => { const p = planets.find(p => p.name === t.arrival.planet); return [p.x, p.y, p.z]; })();
    return { from: t.departure.planet, to: t.arrival.planet,
      fromPos, toPos,
      episode: t.episode, color: EPISODE_COLORS[t.episode], label: t.leg };
  });

  const transfers = data.transfers.map(t => ({
    startDay: t.departure.jd - firstJd,
    endDay: t.arrival.jd - firstJd,
    episode: t.episode,
    label: t.leg,
    from: t.departure.planet,
    to: t.arrival.planet,
  }));

  // Generate parking orbits between transfer gaps
  const PARKING_RADII = { mars: 0.15, jupiter: 0.4, saturn: 0.35, uranus: 0.25, earth: 0.15 };
  const parkingOrbits = [];
  for (let i = 0; i < transfers.length; i++) {
    const nextStart = i + 1 < transfers.length ? transfers[i + 1].startDay : totalDays;
    const gap = nextStart - transfers[i].endDay;
    if (gap > 0.01) {
      const pr = (PARKING_RADII[transfers[i].to] ?? 0.15) * 3;
      const numOrbits = Math.min(3, Math.max(2, gap * 0.5));
      parkingOrbits.push({
        planet: transfers[i].to,
        startDay: transfers[i].endDay,
        endDay: nextStart,
        radiusScene: pr * 2,
        angularVelocityPerDay: (numOrbits * 2 * Math.PI) / gap,
      });
    }
  }

  const timeline = { totalDays, orbits, transfers, parkingOrbits: parkingOrbits.length > 0 ? parkingOrbits : undefined };

  const orbitCircles = planetOrder.map((name, i) => {
    const p = data.planetaryZHeightsAtEpoch[name];
    return { name, radiusScene: (ORBIT_RADII_AU[name] ?? 5) * AU_TO_SCENE, color: PLANET_COLORS[name] ?? "#ffffff", z: zFromAU(p?.zHeightAU ?? 0) };
  });

  const transferSummary = data.transfers
    .filter(t => typeof t.outOfPlaneDistanceAU === "number")
    .map(t => ({ leg: t.leg, outOfPlaneDistanceAU: t.outOfPlaneDistanceAU, planeChangeFractionPercent: t.planeChangeFractionPercent || 0 }));

  return { type: "full-route", title: "ケストレル号全航路 — 3D黄道面ビュー",
    description: "太陽系横断4レグの軌道遷移を3Dで表示。Z軸（黄道面からの高さ）を3倍誇張して表示。土星が最も黄道面から離れ（+0.32 AU）、木星はわずかに下方（-0.04 AU）。",
    planets, transferArcs, orbitCircles,
    eclipticPlane: { type: "ecliptic", normal: [0,0,1], z: 0, color: "#334455", opacity: 0.15, label: "黄道面" },
    timeline,
    transferSummary: transferSummary.length > 0 ? transferSummary : undefined,
  };
}

function prepareJupiterCaptureScene(data) {
  const j = data.jupiterCaptureAnalysis;
  const gR = j.ganymedeOrbitKm / 50000, gA = Math.PI * 0.7;
  const gM = { name: "ganymede", x: gR*Math.cos(gA), y: gR*Math.sin(gA), z: 0, color: PLANET_COLORS.ganymede, radius: 0.08, orbitRadius: j.ganymedeOrbitKm, label: "ガニメデ" };
  const ioM = mkMoon("io", "イオ", Math.PI*0.2);
  const euM = mkMoon("europa", "エウロパ", Math.PI*1.4);
  const caM = mkMoon("callisto", "カリスト", Math.PI*1.1);
  const pjKm = j.perijoveRJ * JUPITER_RADIUS_KM, pjR = pjKm / 50000, pjA = Math.PI * 1.5;
  const pjPos = [pjR*Math.cos(pjA), pjR*Math.sin(pjA), 0];
  const approachPos = [12, 5, 0];
  return { type: "jupiter-capture", title: "木星捕獲 — 3Dビュー",
    description: `ペリジュピター捕獲（${j.perijoveRJ} RJ）とIF高高度捕獲の比較。オーベルト効果によりペリジュピター経由はΔV ${j.canonicalDeltaVKms} km/sで捕獲可能、高高度では${j.ifDeltaVKms} km/s必要。`,
    supportedViewModes: ["inertial", "ship"],
    scenarios: [
      { id: "canonical", label: `作中航路 — ペリジュピター捕獲（ΔV ${j.canonicalDeltaVKms} km/s, ${j.perijoveRJ} RJ）` },
      { id: "high-altitude", label: `IF: 高高度捕獲（ΔV ${j.ifDeltaVKms} km/s）`, isCounterfactual: true, color: "#d2a8ff" },
    ],
    planets: [
      { name: "jupiter", x: 0, y: 0, z: 0, color: PLANET_COLORS.jupiter, radius: 0.5, isCentral: true, label: "木星" },
      ioM, euM, gM, caM,
    ],
    transferArcs: [
      { from: "mars", to: "jupiter", fromPos: approachPos, toPos: pjPos, episode: 1, color: "#3fb950", label: `ペリジュピター捕獲（ΔV=${j.canonicalDeltaVKms} km/s）`, scenarioId: "canonical" },
      { from: "jupiter", to: "ganymede", fromPos: pjPos, toPos: [gM.x, gM.y, 0], episode: 1, color: "#3fb950", label: "ペリジュピター→ガニメデ遷移", scenarioId: "canonical" },
      { from: "mars", to: "ganymede", fromPos: approachPos, toPos: [gM.x, gM.y, 0], episode: 1, color: "#d2a8ff", label: `IF: 高高度捕獲（ΔV=${j.ifDeltaVKms} km/s）`, scenarioId: "high-altitude", isCounterfactual: true },
    ],
    orbitCircles: [
      { name: "io", radiusScene: MOON_ORBIT_KM.io / 50000, color: PLANET_COLORS.io, z: 0 },
      { name: "europa", radiusScene: MOON_ORBIT_KM.europa / 50000, color: PLANET_COLORS.europa, z: 0 },
      { name: "ganymede", radiusScene: j.ganymedeOrbitKm / 50000, color: PLANET_COLORS.ganymede, z: 0 },
      { name: "callisto", radiusScene: MOON_ORBIT_KM.callisto / 50000, color: PLANET_COLORS.callisto, z: 0 },
    ],
    timeline: { totalDays: MOON_PERIODS_DAYS.ganymede * 3, orbits: [
      { name: "io", radiusScene: MOON_ORBIT_KM.io / 50000, initialAngle: Math.PI * 0.2, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.io, z: 0 },
      { name: "europa", radiusScene: MOON_ORBIT_KM.europa / 50000, initialAngle: Math.PI * 1.4, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.europa, z: 0 },
      { name: "ganymede", radiusScene: j.ganymedeOrbitKm / 50000, initialAngle: gA, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.ganymede, z: 0 },
      { name: "callisto", radiusScene: MOON_ORBIT_KM.callisto / 50000, initialAngle: Math.PI * 1.1, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.callisto, z: 0 },
    ], transfers: [{ startDay: 0, endDay: MOON_PERIODS_DAYS.ganymede, episode: 1, label: "火星→木星 接近", from: "mars", to: "jupiter" }] }
  };
}

function prepareSaturnScene(data) {
  const r = data.saturnRingAnalysis;
  const eA = Math.PI/4, eR = r.enceladusOrbitKm/50000;
  const eM = { name: "enceladus", x: eR*Math.cos(eA), y: eR*Math.sin(eA), z: 0, color: PLANET_COLORS.enceladus, radius: 0.08, orbitRadius: r.enceladusOrbitKm, label: "エンケラドス" };
  const rM = mkMoon("rhea", "レア (IF)", Math.PI*0.6);
  const tM = mkMoon("titan", "タイタン (IF)", Math.PI*1.1);
  const eRs = r.enceladusOrbitKm/50000, rRs = MOON_ORBIT_KM.rhea/50000, tRs = MOON_ORBIT_KM.titan/50000;
  return { type: "saturn-ring", title: "土星リング面交差 — 3Dビュー",
    description: "木星からの接近軌道と土星リング面の関係。IF分析: エンケラドス（作中）・レア・タイタンの各衛星への捕獲軌道を比較。",
    supportedViewModes: ["inertial", "ship"],
    scenarios: [
      { id: "canonical", label: "作中航路 — エンケラドス捕獲（ΔV 0.61 km/s）" },
      { id: "rhea", label: "IF: レア捕獲（ΔV 0.88 km/s）", isCounterfactual: true, color: PLANET_COLORS.rhea },
      { id: "titan", label: "IF: タイタン捕獲（ΔV 1.29 km/s）", isCounterfactual: true, color: PLANET_COLORS.titan },
    ],
    planets: [
      { name: "saturn", x: 0, y: 0, z: 0, color: PLANET_COLORS.saturn, radius: 0.5, isCentral: true, label: "土星" },
      eM, rM, tM,
    ],
    transferArcs: [
      { from: "jupiter", to: "saturn", fromPos: [10, 2, 0], toPos: [0, 0, 0], episode: 2, color: EPISODE_COLORS[2], label: "木星→土星 接近軌道", approachAngleDeg: r.approachFromJupiter.approachAngleToDeg, scenarioId: "canonical" },
      { from: "saturn", to: "enceladus", fromPos: [eRs*1.5, eRs*0.3, 0], toPos: [eM.x, eM.y, 0], episode: 2, color: "#3fb950", label: "エンケラドス捕獲（ΔV=0.61 km/s）", scenarioId: "canonical" },
      { from: "saturn", to: "rhea", fromPos: [rRs*1.3, rRs*0.5, 0], toPos: [rM.x, rM.y, 0], episode: 2, color: PLANET_COLORS.rhea, label: "IF: レア捕獲（ΔV=0.88 km/s）", scenarioId: "rhea", isCounterfactual: true },
      { from: "saturn", to: "titan", fromPos: [tRs*1.1, tRs*0.6, 0], toPos: [tM.x, tM.y, 0], episode: 2, color: PLANET_COLORS.titan, label: "IF: タイタン捕獲（ΔV=1.29 km/s）", scenarioId: "titan", isCounterfactual: true },
    ],
    rings: [{ innerRadius: r.ringInnerKm, outerRadius: r.ringOuterKm, normal: r.ringPlaneNormal, color: "#c8a86e", opacity: 0.3 }],
    timeline: { totalDays: MOON_PERIODS_DAYS.enceladus * 3, orbits: [
      { name: "enceladus", radiusScene: r.enceladusOrbitKm / 50000, initialAngle: Math.PI / 4, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.enceladus, z: 0 },
      { name: "rhea", radiusScene: MOON_ORBIT_KM.rhea / 50000, initialAngle: Math.PI * 0.6, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.rhea, z: 0 },
      { name: "titan", radiusScene: MOON_ORBIT_KM.titan / 50000, initialAngle: Math.PI * 1.1, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.titan, z: 0 },
    ], transfers: [{ startDay: 0, endDay: MOON_PERIODS_DAYS.enceladus, episode: 2, label: "木星→土星 接近", from: "jupiter", to: "saturn" }] }
  };
}

    supportedViewModes: ["inertial", "ship"],

      { id: "canonical", label: "作中航路 — タイタニア捕獲（ΔV 0.37 km/s）" },
      { id: "miranda", label: "IF: ミランダ捕獲（ΔV 0.21 km/s）", isCounterfactual: true, color: PLANET_COLORS.miranda },
      { id: "oberon", label: "IF: オベロン捕獲（ΔV 0.43 km/s）", isCounterfactual: true, color: PLANET_COLORS.oberon },

    transferArcs: [
      { from: "saturn", to: "uranus", fromPos: [10, 3, 0], toPos: [0, 0, 0], episode: 3, color: EPISODE_COLORS[3], label: "土星→天王星 接近", approachAngleDeg: u.approachFromSaturn.angleToDeg, scenarioId: "canonical" },

      { from: "uranus", to: "miranda", fromPos: [miRs*1.5, miRs*0.5, 0], toPos: [miM.x, miM.y, 0], episode: 3, color: PLANET_COLORS.miranda, label: "IF: ミランダ捕獲（ΔV=0.21 km/s）", scenarioId: "miranda", isCounterfactual: true },
      { from: "uranus", to: "oberon", fromPos: [obRs*1.3, obRs*0.5, 0], toPos: [obM.x, obM.y, 0], episode: 3, color: PLANET_COLORS.oberon, label: "IF: オベロン捕獲（ΔV=0.43 km/s）", scenarioId: "oberon", isCounterfactual: true },
      { from: "uranus", to: "earth", fromPos: [0, 0, 0], toPos: [-8, -4, 0], episode: 5, color: EPISODE_COLORS[5], label: "天王星→地球 離脱", approachAngleDeg: u.approachFromUranus.angleToDeg, scenarioId: "canonical" },
    ],
    rings: [{ innerRadius: 37850, outerRadius: u.ringOuterKm, normal: u.spinAxis, color: "#556677", opacity: 0.2 }],

    planes: [{ type: "equatorial", normal: u.spinAxis, tiltDeg: u.obliquityDeg, color: "#7ec8e3", opacity: 0.12, label: "天王星赤道面" }],

      { name: "miranda", radiusScene: MOON_ORBIT_KM.miranda / 50000, initialAngle: Math.PI * 0.8, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.miranda, z: 0 },
      { name: "oberon", radiusScene: MOON_ORBIT_KM.oberon / 50000, initialAngle: Math.PI * 1.3, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.oberon, z: 0 },
    ], transfers: [{ startDay: 0, endDay: MOON_PERIODS_DAYS.titania, episode: 3, label: "土星→天王星 接近", from: "saturn", to: "uranus" }] }

function prepareEarthArrivalScene(data) {
  const e = data.earthArrivalAnalysis;
  const lunaA = Math.PI * 0.65;
  const lunaR = MOON_ORBIT_KM.luna / 50000;
  const lunaM = mkMoon("luna", "月", lunaA);
  const leoR = e.leoRadiusKm / 50000;
  const geoR = 42157 / 50000;
  const soiR = e.earthSOIRadiusKm / 50000;
  const approachDist = Math.min(soiR * 0.8, 15);
  const approachPos = [approachDist * Math.cos(Math.PI * 0.15), approachDist * Math.sin(Math.PI * 0.15), 0];
  const leoInsertPos = [leoR * 2 * Math.cos(Math.PI * 1.2), leoR * 2 * Math.sin(Math.PI * 1.2), 0];
  const directApproachPos = [approachDist * Math.cos(Math.PI * 0.3), approachDist * Math.sin(Math.PI * 0.3), 0];
  const failDist = MOON_ORBIT_KM.luna / 50000 * 0.5;
  const failPos = [failDist * Math.cos(Math.PI * 0.9), failDist * Math.sin(Math.PI * 0.9), 0];
  return { type: "earth-arrival", title: "地球到着 — 3Dビュー",
    description: `LEO ${e.leoAltitudeKm}km投入シーン。作中航路（木星フライバイ経由）ではΔV ${e.dvCaptureLEOKms.toFixed(2)} km/sでLEO捕獲成功、ノズル残余${e.nozzleMarginMinutes}分。IF直行ルートではノズルが${e.ifNozzleFailMinutes}分前に寿命を迎え、LEO投入失敗。`,
    supportedViewModes: ["inertial", "ship"],
    scenarios: [
      { id: "canonical", label: `作中航路 — LEO投入成功（ΔV ${e.dvCaptureLEOKms.toFixed(1)} km/s, ノズル残${e.nozzleMarginMinutes}分）` },
      { id: "direct-fail", label: `IF: 直行ルート — ノズル${e.ifNozzleFailMinutes}分前に消失（LEO投入失敗）`, isCounterfactual: true, color: "#888888" },
    ],
    planets: [
      { name: "earth", x: 0, y: 0, z: 0, color: PLANET_COLORS.earth, radius: 0.5, isCentral: true, label: "地球" },
      lunaM,
    ],
    transferArcs: [
      { from: "jupiter", to: "earth", fromPos: approachPos, toPos: leoInsertPos, episode: 5, color: "#3fb950", label: `LEO投入成功（ΔV=${e.dvCaptureLEOKms.toFixed(2)} km/s, ノズル残${e.nozzleMarginMinutes}分）`, scenarioId: "canonical" },
      { from: "uranus", to: "earth", fromPos: directApproachPos, toPos: failPos, episode: 5, color: "#888888", label: `IF: 直行ルート（ノズル${e.ifNozzleFailMinutes}分前消失 ✕）`, scenarioId: "direct-fail", isCounterfactual: true },
    ],
    orbitCircles: [
      { name: "leo", radiusScene: leoR, color: "#22c55e", z: 0 },
      { name: "geo", radiusScene: geoR, color: "#666666", z: 0 },
      { name: "luna", radiusScene: lunaR, color: PLANET_COLORS.luna, z: 0 },
    ],
    timeline: { totalDays: MOON_PERIODS_DAYS.luna, orbits: [
      { name: "luna", radiusScene: lunaR, initialAngle: lunaA, meanMotionPerDay: 2 * Math.PI / MOON_PERIODS_DAYS.luna, z: 0 },
    ], transfers: [{ startDay: 0, endDay: MOON_PERIODS_DAYS.luna * 0.3, episode: 5, label: "木星フライバイ→地球 接近", from: "jupiter", to: "earth" }] }
  };
}

const PLANET_LABELS = { mars: "火星", jupiter: "木星", saturn: "土星", uranus: "天王星", earth: "地球" };
const EPISODE_TITLES = { 1: "EP01: 火星→木星", 2: "EP02: 木星→土星", 3: "EP03: 土星→天王星", 4: "EP04: 天王星→地球" };

function prepareEpisodeScene(data, episode) {
  const transfer = data.transfers.find(t => t.episode === episode);
  if (!transfer) return prepareFullRouteScene(data);

  const allPlanets = ["mars", "jupiter", "saturn", "uranus", "earth"];
  const depP = transfer.departure.planet;
  const arrP = transfer.arrival.planet;
  const depI = allPlanets.indexOf(depP);
  const arrI = allPlanets.indexOf(arrP);
  const minI = Math.max(0, Math.min(depI, arrI) - 1);
  const maxI = Math.min(allPlanets.length - 1, Math.max(depI, arrI) + 1);
  const visible = allPlanets.slice(minI, maxI + 1);

  const firstJd = data.transfers[0].departure.jd;
  const depDay = transfer.departure.jd - firstJd;
  const arrDay = transfer.arrival.jd - firstJd;
  const epTotalDays = arrDay - depDay;

  const planets = visible.map((name, i) => {
    const p = data.planetaryZHeightsAtEpoch[name];
    const globalI = allPlanets.indexOf(name);
    const a = planetAngle(name, globalI, data);
    const mm = (2 * Math.PI) / (ORBITAL_PERIODS_DAYS[name] || 365);
    const adjA = a + mm * depDay;
    const r = (ORBIT_RADII_AU[name] ?? 5) * AU_TO_SCENE;
    return { name, x: r * Math.cos(adjA), y: r * Math.sin(adjA), z: zFromAU(p?.zHeightAU ?? 0),
      color: PLANET_COLORS[name], radius: PLANET_RADII[name] ?? 0.15, label: PLANET_LABELS[name] || name };
  });

  const orbits = visible.map(name => {
    const p = data.planetaryZHeightsAtEpoch[name];
    const globalI = allPlanets.indexOf(name);
    const a = planetAngle(name, globalI, data);
    const mm = (2 * Math.PI) / (ORBITAL_PERIODS_DAYS[name] || 365);
    return { name, radiusScene: (ORBIT_RADII_AU[name] ?? 5) * AU_TO_SCENE,
      initialAngle: a + mm * depDay, meanMotionPerDay: mm, z: zFromAU(p?.zHeightAU ?? 0) };
  });

  const orbMap = {};
  orbits.forEach(o => { orbMap[o.name] = o; });
  function posAtDay(orb, day) {
    const a2 = orb.initialAngle + orb.meanMotionPerDay * day;
    return [orb.radiusScene * Math.cos(a2), orb.radiusScene * Math.sin(a2), orb.z];
  }

  const fo = orbMap[depP], to2 = orbMap[arrP];
  const fromPos = fo ? posAtDay(fo, 0) : [planets[0].x, planets[0].y, planets[0].z];
  const toPos = to2 ? posAtDay(to2, epTotalDays) : [planets[planets.length - 1].x, planets[planets.length - 1].y, planets[planets.length - 1].z];

  const orbitCircles = visible.map(name => {
    const p = data.planetaryZHeightsAtEpoch[name];
    return { name, radiusScene: (ORBIT_RADII_AU[name] ?? 5) * AU_TO_SCENE, color: PLANET_COLORS[name] ?? "#ffffff", z: zFromAU(p?.zHeightAU ?? 0) };
  });

  return { type: `episode-${episode}`, title: EPISODE_TITLES[episode] || `EP0${episode}`,
    description: `${PLANET_LABELS[depP] || depP}→${PLANET_LABELS[arrP] || arrP}（${transfer.leg}）`,
    planets, transferArcs: [{ from: depP, to: arrP, fromPos, toPos, episode, color: EPISODE_COLORS[episode], label: transfer.leg }],
    orbitCircles,
    eclipticPlane: { type: "ecliptic", normal: [0,0,1], z: 0, color: "#334455", opacity: 0.15, label: "黄道面" },
    timeline: { totalDays: epTotalDays, orbits, transfers: [{ startDay: 0, endDay: epTotalDays, episode, label: transfer.leg, from: depP, to: arrP }] },
  };
}

function prepareEp5FlybyScene(data) {
  const visible = ["earth", "jupiter", "uranus"];
  const allPlanets = ["mars", "jupiter", "saturn", "uranus", "earth"];
  const planets = visible.map(name => {
    const globalI = allPlanets.indexOf(name);
    const a = planetAngle(name, globalI, data);
    const r = (ORBIT_RADII_AU[name] ?? 5) * AU_TO_SCENE;
    return { name, x: r * Math.cos(a), y: r * Math.sin(a), z: 0, color: PLANET_COLORS[name], radius: PLANET_RADII[name] ?? 0.15, label: PLANET_LABELS[name] || name };
  });
  const orbits = visible.map(name => {
    const globalI = allPlanets.indexOf(name);
    const a = planetAngle(name, globalI, data);
    const mm = (2 * Math.PI) / (ORBITAL_PERIODS_DAYS[name] || 365);
    return { name, radiusScene: (ORBIT_RADII_AU[name] ?? 5) * AU_TO_SCENE, initialAngle: a, meanMotionPerDay: mm, z: 0 };
  });
  const orbMap = {}; orbits.forEach(o => { orbMap[o.name] = o; });
  function posAtDay(orb, day) {
    const a2 = orb.initialAngle + orb.meanMotionPerDay * day;
    return [orb.radiusScene * Math.cos(a2), orb.radiusScene * Math.sin(a2), orb.z];
  }
  const leg1Days = 200/24, leg2Days = 307/24, directDays = 398/24;
  const totalDays = leg1Days + leg2Days;
  const uranusPos = posAtDay(orbMap["uranus"], 0);
  const jupiterPos = posAtDay(orbMap["jupiter"], leg1Days);
  const earthPosFlyby = posAtDay(orbMap["earth"], totalDays);
  const earthPosDirect = posAtDay(orbMap["earth"], directDays);
  const orbitCircles = visible.map(name => ({ name, radiusScene: (ORBIT_RADII_AU[name] ?? 5) * AU_TO_SCENE, color: PLANET_COLORS[name] ?? "#ffffff", z: 0 }));
  return { type: "episode-5", title: "EP05: IF分析 — 木星フライバイ vs 直行ルート",
    description: "作中航路（赤/オレンジ: 木星フライバイ経由507h）と直行ルート（灰色: ノズル73分前に消失）を比較。フライバイによるOberth効果+3%がノズル残寿命26分のマージンを生む。",
    planets, orbitCircles, supportedViewModes: ["inertial", "ship"],
    scenarios: [
      { id: "flyby", label: "作中航路 — 507h（木星フライバイ, ノズル残26分）" },
      { id: "direct", label: "IF: 直行ルート — ノズル73分前に消失（帰還失敗）", isCounterfactual: true, color: "#888888" },
    ],
    transferArcs: [
      { from: "uranus", to: "jupiter", fromPos: uranusPos, toPos: jupiterPos, episode: 5, color: EPISODE_COLORS[5], label: "天王星→木星 200h", scenarioId: "flyby" },
      { from: "jupiter", to: "earth", fromPos: jupiterPos, toPos: earthPosFlyby, episode: 5, color: "#ff8844", label: "木星→地球 307h（Oberth +3%）", scenarioId: "flyby" },
      { from: "uranus", to: "earth", fromPos: uranusPos, toPos: earthPosDirect, episode: 5, color: "#888888", label: "IF: 直行 398h（ノズル73分前に消失 ✕）", scenarioId: "direct", isCounterfactual: true },
    ],
    eclipticPlane: { type: "ecliptic", normal: [0,0,1], z: 0, color: "#334455", opacity: 0.15, label: "黄道面" },
    timeline: { totalDays, orbits, transfers: [
      { startDay: 0, endDay: leg1Days, episode: 5, label: "天王星→木星", from: "uranus", to: "jupiter" },
      { startDay: leg1Days, endDay: totalDays, episode: 5, label: "木星→地球", from: "jupiter", to: "earth" },
    ] },
  };
}

// ── Initialize ──
async function init() {
  try {
    const resp = await fetch(analysisDataUrl);
    if (!resp.ok) throw new Error(`Failed to load data: ${resp.status}`);
    analysisData = await resp.json();
  } catch (e) {
    document.getElementById("loading").textContent = `データ読み込みエラー: ${e.message}`;
    return;
  }

  const container = document.getElementById("viewer-container");
  document.getElementById("loading").style.display = "none";

  initViewer(container);

  // Prepare all scenes
  const scenes = {
    "full-route": prepareFullRouteScene(analysisData),
    "episode-1": prepareEpisodeScene(analysisData, 1),
    "episode-2": prepareEpisodeScene(analysisData, 2),
    "episode-3": prepareEpisodeScene(analysisData, 3),
    "episode-4": prepareEpisodeScene(analysisData, 4),
    "episode-5": prepareEp5FlybyScene(analysisData),
    "jupiter-capture": prepareJupiterCaptureScene(analysisData),
    "saturn-ring": prepareSaturnScene(analysisData),
    "uranus-approach": prepareUranusScene(analysisData),
    "earth-arrival": prepareEarthArrivalScene(analysisData),
  };

  // Load default scene
  const infoPanel = document.getElementById("info-panel");
  loadScene(scenes["full-route"]);
  updateInfoPanel(infoPanel, scenes["full-route"]);

  // ── Timeline controls ──
  const tlControls = document.getElementById("timeline-controls");
  const tlPlayBtn = document.getElementById("timeline-play");
  const tlSlider = document.getElementById("timeline-slider");
  const tlTime = document.getElementById("timeline-time");
  const tlTotal = document.getElementById("timeline-total");
  const tlLabel = document.getElementById("timeline-label");
  let isPlaying = false;
  let activeTimeline = null;

  function formatDays(days) {
    if (days < 1) {
      const h = Math.round(days * 24);
      return h + "時間";
    }
    if (days < 30) {
      const d = Math.floor(days);
      const h = Math.round((days - d) * 24);
      return h > 0 ? d + "日" + h + "時間" : d + "日";
    }
    return Math.round(days) + "日";
  }

  function getActiveTransferLabel(day, timeline) {
    if (!timeline) return "";
    for (const t of timeline.transfers) {
      if (day >= t.startDay && day <= t.endDay) {
        return t.label;
      }
    }
    // Between transfers — find which gap
    for (let i = 0; i < timeline.transfers.length - 1; i++) {
      const prev = timeline.transfers[i];
      const next = timeline.transfers[i + 1];
      if (day > prev.endDay && day < next.startDay) {
        return "遷移間（停泊中）";
      }
    }
    return "";
  }

  function updateTimelineUI(day, timeline) {
    if (!timeline) return;
    const progress = timeline.totalDays > 0 ? (day / timeline.totalDays) * 1000 : 0;
    tlSlider.value = Math.round(progress);
    tlSlider.setAttribute("aria-valuenow", String(Math.round(progress)));
    tlTime.textContent = formatDays(day);
    tlLabel.textContent = getActiveTransferLabel(day, timeline);
  }

  function activateTimeline(sceneData) {
    const timeline = sceneData.timeline;
    activeTimeline = timeline || null;
    // Expose totalDays for screenshot automation
    window.__timelineTotalDays = timeline ? timeline.totalDays : 0;
    if (timeline) {
      loadTimeline(timeline);
      tlControls.classList.add("active");
      updateTimelineUI(0, timeline);
      if (tlTotal) tlTotal.textContent = "/ " + formatDays(timeline.totalDays);
      updateTimelineFrame(0);

      // Callback from animation loop
      window._onTimelineUpdate = (day) => updateTimelineUI(day, timeline);
      window._onTimelineEnd = () => {
        isPlaying = false;
        tlPlayBtn.textContent = "\u25b6";
        tlPlayBtn.setAttribute("aria-label", "再生");
      };
    } else {
      activeTimeline = null;
      tlControls.classList.remove("active");
      setTimelinePlaying(false);
      isPlaying = false;
    }
  }

  tlPlayBtn.addEventListener("click", () => {
    if (!activeTimeline) return;
    if (isPlaying) {
      isPlaying = false;
      setTimelinePlaying(false);
      tlPlayBtn.textContent = "\u25b6";
      tlPlayBtn.setAttribute("aria-label", "再生");
    } else {
      // Reset to start if at end
      if (getTimelineCurrentDay() >= activeTimeline.totalDays) {
        updateTimelineFrame(0);
        updateTimelineUI(0, activeTimeline);
      }
      isPlaying = true;
      setTimelinePlaying(true);
      tlPlayBtn.textContent = "\u23f8";
      tlPlayBtn.setAttribute("aria-label", "一時停止");
    }
  });

  tlSlider.addEventListener("input", () => {
    if (!activeTimeline) return;
    const val = parseFloat(tlSlider.value);
    const day = (val / 1000) * activeTimeline.totalDays;
    updateTimelineFrame(day);
    updateTimelineUI(day, activeTimeline);
    // Pause on manual scrub
    if (isPlaying) {
      isPlaying = false;
      setTimelinePlaying(false);
      tlPlayBtn.textContent = "\u25b6";
      tlPlayBtn.setAttribute("aria-label", "再生");
    }
  });

  // ── Preset buttons ──
  function switchScene(sceneKey) {
    const sceneData = scenes[sceneKey];
    if (!sceneData) return;

    // Stop any running animation
    if (isPlaying) {
      isPlaying = false;
      setTimelinePlaying(false);
      tlPlayBtn.textContent = "\u25b6";
      tlPlayBtn.setAttribute("aria-label", "再生");
    }

    loadScene(sceneData);
    updateInfoPanel(infoPanel, sceneData);
    activateTimeline(sceneData);
  }

  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".preset-btn").forEach(b => {
        b.classList.remove("active");
        b.setAttribute("aria-pressed", "false");
      });
      btn.classList.add("active");
      btn.setAttribute("aria-pressed", "true");
      switchScene(btn.dataset.scene);
    });
  });

  // ── Speed control ──
  const speedBtn = document.getElementById("speed-btn");
  const speeds = [0.5, 1, 2, 4];
  speedBtn.addEventListener("click", () => {
    const cur = getAnimationSpeed();
    const idx = speeds.indexOf(cur);
    const next = speeds[(idx + 1) % speeds.length];
    setAnimationSpeed(next);
    speedBtn.textContent = next + "×";
  });

  // ── View mode toggle ──
  const viewModeBtn = document.getElementById("view-mode-btn");
  viewModeBtn.addEventListener("click", () => {
    const current = getViewMode();
    const next = current === "inertial" ? "ship" : "inertial";
    setViewMode(next);
    viewModeBtn.textContent = next === "inertial" ? "慣性" : "宇宙船";
    viewModeBtn.setAttribute("aria-label", next === "inertial" ? "慣性座標系" : "宇宙船視点");
  });

  // Activate timeline for default scene
  activateTimeline(scenes["full-route"]);
}

init().catch(err => console.error("3D viewer init error:", err));
</script>
